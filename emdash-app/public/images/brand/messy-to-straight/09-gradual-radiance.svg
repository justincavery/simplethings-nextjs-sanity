<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title">
	<title>Gradual radiance messy to straight</title>
	<defs>
		<linearGradient id="lineGradient" x1="10" y1="34" x2="56" y2="32" gradientUnits="userSpaceOnUse">
			<stop offset="0" stop-color="#171412"/>
			<stop offset="0.46" stop-color="#c2410c"/>
			<stop offset="1" stop-color="#e6332a"/>
		</linearGradient>
		<filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
			<feGaussianBlur stdDeviation="2.5" result="blur"/>
			<feMerge>
				<feMergeNode in="blur"/>
				<feMergeNode in="SourceGraphic"/>
			</feMerge>
		</filter>
	</defs>
	<rect width="64" height="64" rx="12" fill="#fbfbfa"/>
	<path d="M10 34 C13 11 17 55 21 33 C24 13 28 53 32 31 C36 12 39 47 43 31 C47 19 51 34 56 32" fill="none" stroke="#171412" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.35"/>
	<path d="M10 34 L56 32" fill="none" stroke="url(#lineGradient)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="1" filter="url(#glow)"/>
	<circle cx="10" cy="34" r="4" fill="#171412" opacity="0.8"/>
	<circle cx="56" cy="32" r="4" fill="#e6332a" opacity="1"/>
	
</svg>
